# maimai 谱面生成配置。
# 所有相对路径都以本文件所在的项目根目录为起点。
# 程序启动时会检查数值范围和参数之间的关系，配置不合理会直接说明原因并停止。

路径:
  # 训练数据目录。每首歌曲通常应包含 maidata.txt 和 track.mp3。
  谱面目录: charts
  # 冻结 MERT 提取的整曲特征缓存目录。
  MERT缓存目录: .cache/mert
  # 训练得到的模型文件保存目录。
  检查点目录: checkpoints

MERT:
  # Hugging Face 标准格式的本地模型目录。模型仅用于离线特征提取，不参与训练。
  模型目录: MERT-v1-95M
  # 长音频按核心区分块，左右各带充分上下文后送入 MERT。
  分块秒数: 30.0
  上下文秒数: 10.0
  # 整曲缓存使用半精度以降低磁盘和读取开销。
  缓存半精度: true

滑窗:
  # 每个窗口直接截取的 MERT 特征帧数；MERT-v1-95M 为 75 Hz。
  # 2612 帧约为 34.83 秒。
  MERT帧数: 2612
  # 模型可见的历史谱面从窗口第几秒开始；这部分只作上下文，不计算训练损失。
  前缀开始秒: 6.0
  # 模型真正需要学习和生成的区域从窗口第几秒开始。
  目标开始秒: 12.0
  # 模型真正需要学习和生成的区域在窗口第几秒结束，不包含该时刻。
  目标结束秒: 22.0
  # 训练窗口每次向后移动多少秒。越小，重复样本越多，训练越慢。
  训练步进秒: 1.0
  # 推理每个窗口提交多少秒的新谱面，必须等于“目标结束秒 - 目标开始秒”。
  推理步进秒: 10.0

模型:
  # 解码器状态维度必须等于冻结 MERT 的输出维度。
  状态维度: 768
  注意力头数: 12
  层数: 4
  # 每个滑窗最多容纳多少个谱面词元。调小可能装不下密集谱面，调大会增加显存占用。
  # 它也是文本解码器的上下文长度，修改后旧模型不再兼容。
  最大词元数: 2048

训练:
  # 读取 maidata.txt 中哪个难度：4 是 Expert，5 是 Master。
  难度编号: 5
  # 每次同时训练多少个样本。显存不足时优先调小。
  批大小: 8
  # 后台读取数据的进程数。内存不足或排查加载问题时可设为 0。
  数据加载进程数: 2
  # 每个数据进程提前准备多少批；进程数为 0 时不会使用。
  预取批数: 2
  # 是否把批数据放入锁页内存，使用 CUDA 时通常能加快传输，但会多占主内存。
  锁页内存: true
  # 最多训练多少轮。
  训练轮数: 500
  # 优化器每次更新参数的步幅。过大可能不收敛，过小会训练缓慢。
  学习率: 0.0003
  # AdamW 对模型参数施加的正则强度。
  权重衰减: 0.01
  # 未启用过拟合模式时，按歌曲划入验证集的比例。
  验证集比例: 0.15
  # 限制一次反向传播的最大梯度范数，防止训练突然不稳定。
  梯度裁剪: 1.0
  # 验证损失连续多少轮没有改善后停止训练。
  提前停止耐心轮数: 12
  # 交叉熵标签平滑强度，必须在 0 到 1 之间，不包含 1。
  标签平滑: 0.05
  # EOS 表示一个窗口生成结束；提高此值可缓解模型一直不肯结束的问题。
  结束词元损失权重: 5.0
  # 余弦学习率从高到低变化所用的轮数。
  学习率退火周期: 80
  # 控制歌曲划分和随机抽样，保持不变可复现实验划分。
  随机种子: 42
  # 每轮用正式整曲推理评估多少首验证歌曲。越大越慢。
  整曲验证歌曲数: 2
  # 每轮额外用真实历史谱面作为前缀检查多少个窗口。
  真值前缀验证窗口数: 8
  # 设为大于 0 时，只选指定数量的完整歌曲进行过拟合排查；0 表示正常训练。
  过拟合歌曲数: 5
  # 从哪个检查点继续训练；null 表示从头训练。
  恢复检查点: null
  # 每个样本使用多少种整体旋转方向。1 表示不扩增，8 表示覆盖全部八个方向。
  旋转增强数: 8

推理:
  # 默认加载的模型文件。
  检查点: checkpoints/best_gen.pt
  # 输出写入哪个 &inote_* 位置。它不会把 Expert 模型自动变成 Master 模型。
  难度编号: 5
  # 从歌曲第几秒开始生成，通常保持 0。
  开始秒: 0.0
