# 所有相对路径都以项目根目录为起点。
路径:
  谱面目录: charts
  检查点目录: checkpoints
  训练输出目录: tmp/train
  推理输出目录: tmp/infer

音频:
  采样率: 24000
  跳步长度: 120
  FFT长度: 1024
  窗口长度: 480
  Mel频带数: 128
  最低频率: 20.0
  最高频率: 12000.0

数据增强:
  变调概率: 0.5
  最大变调半音: 0.3
  变速概率: 0.5
  最小变速倍率: 0.98
  最大变速倍率: 1.02
  时间平移概率: 0.5
  最大平移秒数: 1.0
  频率遮蔽概率: 0.5
  最大遮蔽频带数: 8
  EQ概率: 0.5
  最大EQ增益: 0.15
  噪声概率: 0.5
  最大噪声标准差: 0.003

模型:
  隐藏维度: 256
  层数: 8
  注意力头数: 8
  丢弃率: 0.05

训练:
  窗口帧数: 1024
  窗口步长: 512
  训练歌曲数: 100
  批大小: 48
  锁页内存: true
  数据加载进程数: 4
  每进程预取批次数: 2
  恢复检查点: null
  训练轮数: 300
  学习率: 0.0003
  最低学习率: 0.000001
  预热比例: 0.05
  权重衰减: 0.01
  验证集比例: 0.15
  测试集比例: 0.10
  梯度裁剪: 1.0
  提前停止耐心轮数: 60
  随机种子: 42
  事件窗口比例: 0.25

推理:
  输入音频: input.mp3
  检查点: checkpoints/best-v3.pt
  难度编号: 5
  浮点难度: 13.0
  短音最小间隔帧: 6
  持续音最短帧数: 10
  最短持续秒数: 0.05
  最长持续秒数: 29.99
